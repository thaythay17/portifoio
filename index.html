<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body> <!-- corpo do site --> 

    <nav class="menu"> <!-- usado para criar o menu de navegação -->

        <ul class="menu-list"> <!-- usado para criar uma lista de itens -->
            <li> <!-- criado para cada item da lista -->
                <a href="#inicio" class="link-menu">Início</a> 
            </li>

            <li>
                <a href="#sobre" class="link-menu">Sobre</a>
            </li>

             <li>
                <a href="#projetos" class="link-menu">Projetos</a>
            </li>

            <li>
                <a href="#contato" class="link-menu">Contato</a>
            </li>

            <button id="botao-tema">🌙</button>

        </ul>

    </nav>

    <main id="inicio" class="cabeca"> <!-- parte principal do site -->
        <div class="caixa-perfil">
            <img src="./gatinho.jpg" alt="foto da thaynara ribeiro silva" class="foto-perfil">
        </div>

        <div> <!-- usado para agrupar elementos e aplicar estilos a eles -->
            <h1>Thaynara Ribeiro Silva</h1>
            <p class="paragrafo-cabeca">Estudante nas horas vagas</p>
        </div>

    </main>

    <section id="sobre" class="sobre"> <!-- usado para agrupar conteúdos que possuem uma relação lógica ou temática entre si -->

        <h2 class="sobre-titulo">Informativo</h2>

        <div class="sobre-cai"> <!-- div contêiner genérico usado para agrupar outros elementos HTML -->
            <p class="sobre-paragrafo">kaue bobao</p>
        </div>

    </section>

    <section id="projetos" class="projetos">

        <h2 class="projetos-titulo">Projetos</h2>

        <div class="projetos-grid"> 

            <div class="projeto">
                <div class="projeto1-imagem">
                    <img src="desenho.jpg" alt="em construção">
                </div>

                <h3 class="titulo-projeto">Em breve</h3>

                <p class="projeto1-descricao">Em breve</p>
            </div>

            <div class="projeto">
                <div class="projeto1-imagem">
                    <img src="desenho.jpg" alt="em construção">
                </div>

                <h3 class="titulo-projeto">Em breve</h3>

                <p class="projeto2-descricao">Em breve</p>
            </div>

        </div>

    </section>

    <section id="contato" class="contato">

        <h2 class="contato-titulo">Entre em contato</h2>

        <form class="contato-formulario" id="formulario" onsubmit="enviarWa(event)">
            <div class="grupo-form">
                <input placeholder="Nome" class="campo-form" id="nome">
            </div>

            <div class="grupo-form">
                <textarea class="campo-form" placeholder="Digite sua mensagem" id="mensagem"></textarea>
            </div>

            <button type="submit" class="botao-form">Enviar whatsapp</button>
        </form>

    </section>

    <script>

        function enviarWa(event) {
             event.preventDefault();

            const nome = document.getElementById('nome');
            const mensagem = document.getElementById('mensagem');
            const telefone = '5564992210923';

            const texto = 'Olá, meu nome é ' + nome.value + ', '  + mensagem.value;
            const msformatada = encodeURIComponent(texto);

            const url = 'https://wa.me/' + telefone + '?text=' + msformatada;

            window.open(url, '_blank');
        }
    </script>

    <script>
        const botaoTema = document.getElementById("botao-tema");
        botaoTema.addEventListener("click", () => {
            document.body.classList.toggle("tema-escuro");

            if(document.body.classList.contains("tema-escuro")){
                botaoTema.innerHTML = "☀️";
            }
            else {
                botaoTema.innerHTML = "🌙";
            }
        });
    </script>

</body>
</html>
